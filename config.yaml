llm:
  provider: claude

news:
  use_real_sources: true
  enable_web_search: true
  max_items_per_source: 10

  topics:
    - "Large Language Models (LLM) breakthroughs and new releases"
    - "AI Agents and autonomous AI systems"
    - "AI in healthcare and drug discovery"
    - "AI coding tools (Claude Code, Cursor, GitHub Copilot)"
    - "Open source AI models and tools"
    - "Neurology clinical trials (epilepsy, rare diseases)"
    - "Dravet syndrome, Lennox-Gastaut syndrome, CDKL5 deficiency treatments"
    - "FDA/NMPA/EMA regulatory decisions for neurology drugs"
    - "Rare disease drug development and orphan drug approvals"
    - "Pharma licensing deals and BD partnerships"

  prompt_template: |
    You are a senior analyst with dual expertise in AI technology and pharmaceutical/neurology clinical development. Create a daily intelligence briefing.

    From the provided news items, organize as follows:

    PART 1: AI & TECHNOLOGY (8-10 items)
    Focus: LLM releases, AI agents, AI in healthcare/drug discovery, developer tools, open-source AI.
    For each: Headline, 2-3 sentence analysis (WHY this matters, not just what happened), Source.

    PART 2: PHARMA & NEUROLOGY (5-8 items)
    Focus: Neurology/rare disease trials (epilepsy, Dravet, LGS, CDKL5), FDA/NMPA decisions, pharma BD deals, drug approvals.
    For each: Headline, 2-3 sentence analysis with clinical/regulatory context, Source.

    PART 3: KEY INSIGHT OF THE DAY (1 item)
    The single most important development with 3-4 sentence strategic analysis.

    Rules: Recent verified news only. No markdown. Include source for every item. Focus on actionable intelligence.
    Topics: {topics}

logging:
  level: INFO
  format: "%(asctime)s - %(levelname)s - %(message)s"
